name: Publish Container Images

on:
  workflow_dispatch:
    inputs:
      version:
        description: Image tag to publish
        required: true
        default: 1.0.0
      dockerhub_namespace:
        description: Optional Docker Hub namespace
        required: true
        default: nacsez
      publish_dockerhub:
        description: Also publish Docker Hub images
        required: true
        type: boolean
        default: false

permissions:
  contents: read
  packages: write

jobs:
  publish:
    name: Build and publish container images
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Log in to Docker Hub
        if: ${{ inputs.publish_dockerhub }}
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build and push API to GHCR
        uses: docker/build-push-action@v6
        with:
          context: apps/api
          push: true
          tags: ghcr.io/nacsez/hypersearch-api:${{ inputs.version }}
          labels: |
            org.opencontainers.image.title=HyperSearch API
            org.opencontainers.image.version=${{ inputs.version }}
            org.opencontainers.image.source=https://github.com/Nacsez/HyperSearch
            org.opencontainers.image.licenses=AGPL-3.0-only
      - name: Build and push UI to GHCR
        uses: docker/build-push-action@v6
        with:
          context: apps/ui
          push: true
          tags: ghcr.io/nacsez/hypersearch-ui:${{ inputs.version }}
          labels: |
            org.opencontainers.image.title=HyperSearch UI
            org.opencontainers.image.version=${{ inputs.version }}
            org.opencontainers.image.source=https://github.com/Nacsez/HyperSearch
            org.opencontainers.image.licenses=AGPL-3.0-only
      - name: Build and push API to Docker Hub
        if: ${{ inputs.publish_dockerhub }}
        uses: docker/build-push-action@v6
        with:
          context: apps/api
          push: true
          tags: docker.io/${{ inputs.dockerhub_namespace }}/hypersearch-api:${{ inputs.version }}
          labels: |
            org.opencontainers.image.title=HyperSearch API
            org.opencontainers.image.version=${{ inputs.version }}
            org.opencontainers.image.source=https://github.com/Nacsez/HyperSearch
            org.opencontainers.image.licenses=AGPL-3.0-only
      - name: Build and push UI to Docker Hub
        if: ${{ inputs.publish_dockerhub }}
        uses: docker/build-push-action@v6
        with:
          context: apps/ui
          push: true
          tags: docker.io/${{ inputs.dockerhub_namespace }}/hypersearch-ui:${{ inputs.version }}
          labels: |
            org.opencontainers.image.title=HyperSearch UI
            org.opencontainers.image.version=${{ inputs.version }}
            org.opencontainers.image.source=https://github.com/Nacsez/HyperSearch
            org.opencontainers.image.licenses=AGPL-3.0-only
