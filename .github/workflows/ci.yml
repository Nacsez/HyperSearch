name: HyperSearch CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  api:
    name: API tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install API
        run: python -m pip install -e ./apps/api[all]
      - name: Run tests
        run: pytest

  ui:
    name: UI build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: |
            apps/ui/package-lock.json
            apps/desktop/package-lock.json
      - name: Build browser UI
        working-directory: apps/ui
        run: npm ci && npm run build
      - name: Build desktop frontend
        working-directory: apps/desktop
        run: npm ci && npm run build

  desktop-native:
    name: Desktop native check
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/desktop/package-lock.json
      - name: Install desktop dependencies
        working-directory: apps/desktop
        run: npm ci
      - name: Cargo check
        working-directory: apps/desktop/src-tauri
        run: cargo check

  compose-and-images:
    name: Compose and image validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Prepare env files
        run: |
          cp .env.example .env
          cp infra/docker/.env.example infra/docker/.env
      - name: Compose release config
        working-directory: infra/docker
        run: docker compose --project-name hypersearch config --quiet
      - name: Compose dev config
        working-directory: infra/docker
        run: docker compose --project-name hypersearch -f docker-compose.yml -f docker-compose.dev.yml config --quiet
      - name: Build API image
        run: docker build -t hypersearch-api:ci apps/api
      - name: Build UI image
        run: docker build -t hypersearch-ui:ci apps/ui
