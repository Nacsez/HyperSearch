name: Publish Container Images

on:
  workflow_dispatch:
    inputs:
      version:
        description: Image tag to publish
        required: true
        default: 1.0.0
      dockerhub_namespace:
        description: Docker Hub namespace
        required: true
        default: nacsez

permissions:
  contents: read
  packages: write

jobs:
  publish:
    name: Build and publish GHCR/Docker Hub images
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build and push API
        uses: docker/build-push-action@v6
        with:
          context: apps/api
          push: true
          tags: |
            ghcr.io/nacsez/hypersearch-api:${{ inputs.version }}
            docker.io/${{ inputs.dockerhub_namespace }}/hypersearch-api:${{ inputs.version }}
      - name: Build and push UI
        uses: docker/build-push-action@v6
        with:
          context: apps/ui
          push: true
          tags: |
            ghcr.io/nacsez/hypersearch-ui:${{ inputs.version }}
            docker.io/${{ inputs.dockerhub_namespace }}/hypersearch-ui:${{ inputs.version }}
