name: HyperSearch CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  api:
    name: API tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install API
        run: python -m pip install -e ./apps/api[all]
      - name: Run tests
        run: pytest

  ui:
    name: UI build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: |
            apps/ui/package-lock.json
            apps/desktop/package-lock.json
      - name: Build browser UI
        working-directory: apps/ui
        run: npm ci && npm run build
      - name: Audit browser UI production dependencies
        working-directory: apps/ui
        run: npm audit --omit=dev --audit-level=high
      - name: Build desktop frontend
        working-directory: apps/desktop
        run: npm ci && npm run build
      - name: Audit desktop production dependencies
        working-directory: apps/desktop
        run: npm audit --omit=dev --audit-level=high

  desktop-native:
    name: Desktop native check
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/desktop/package-lock.json
      - name: Install desktop dependencies
        working-directory: apps/desktop
        run: npm ci
      - name: Cargo check
        working-directory: apps/desktop/src-tauri
        run: cargo check

  compose-and-images:
    name: Compose and image validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Prepare env files
        run: |
          cp .env.example .env
          cp infra/docker/.env.example infra/docker/.env
      - name: Compose release config
        working-directory: infra/docker
        run: docker compose --project-name hypersearch config --quiet
      - name: Compose dev config
        working-directory: infra/docker
        run: docker compose --project-name hypersearch -f docker-compose.yml -f docker-compose.dev.yml config --quiet
      - name: Build API image
        run: docker build -t hypersearch-api:ci apps/api
      - name: Build UI image
        run: docker build -t hypersearch-ui:ci apps/ui

  release-security:
    name: Release security metadata
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Release security check
        shell: pwsh
        run: .\scripts\Test-ReleaseSecurity.ps1 -SkipNetworkAudits
      - name: PowerShell release script parse check
        shell: pwsh
        run: |
          $files = @(
            "scripts/Update-LicenseNotices.ps1",
            "scripts/Test-ReleaseSecurity.ps1",
            "scripts/Sign-HyperSearchRelease.ps1",
            "scripts/Build-InstallationMedia.ps1",
            "scripts/Build-ContainerImages.ps1"
          )
          foreach ($file in $files) {
            $tokens = $null
            $errors = $null
            [System.Management.Automation.Language.Parser]::ParseFile((Resolve-Path $file), [ref]$tokens, [ref]$errors) | Out-Null
            if ($errors) {
              $errors | Format-List
              exit 1
            }
          }
